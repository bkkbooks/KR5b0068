body:
  text: 太上虚皇保生神呪經太上虚皇開散玉庭金房晃曜翠臺鬱青我設三道滅鬼生靈我能無死亦能無生長生自在迴老返嬰䰟𩲸受鍊五神安寧迴飈車輪北謁玉清升入太無與日合明遂成眞人五帝合并三元所告萬神咸聽洞玄三昧無量眞靈羣仙侍衛名列玉清洞眞玉虚無中之無道中之道神化須㬰洞神靈應法象有爲驅邪滅惡運轉璇璣東方保生青童神靈正一守䰟克保昌齡南方保生固氣赤靈萬神無越使我長寧西方保生侍𩲸白靈辟除妖氣令我利亨北方保生通利元精五氣眞符使臣長榮中央保生主我身形飛行自在天地齊并遊觀太虚上朝玉京下祛妖魅福恵羣生太上虛皇保生神呪經
